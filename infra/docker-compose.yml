version: "3.8"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

  runner:
    build:
      context: ..
      dockerfile: infra/Dockerfile.runner
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - api
      - redis
    restart: unless-stopped

  notifier:
    build:
      context: ..
      dockerfile: infra/Dockerfile.notifier
    environment:
      - REDIS_URL=redis://redis:6379/0
      - API_BASE=http://api:8000
    depends_on:
      - api
      - redis
    restart: unless-stopped

  ui:
    build:
      context: ..
      dockerfile: infra/Dockerfile.ui
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped
