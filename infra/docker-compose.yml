version: "3.8"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # No public port - internal only for security
    volumes:
      - redis_data:/data
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --auto-aof-rewrite-percentage
      - "100"
      - --auto-aof-rewrite-min-size
      - "64mb"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - M87_API_KEY=${M87_API_KEY:-m87-dev-key-change-me}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  runner:
    build:
      context: ..
      dockerfile: infra/Dockerfile.runner
    environment:
      - REDIS_URL=redis://redis:6379/0
      - API_BASE=http://api:8000
      - M87_API_KEY=${M87_API_KEY:-m87-dev-key-change-me}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  notifier:
    build:
      context: ..
      dockerfile: infra/Dockerfile.notifier
    environment:
      - REDIS_URL=redis://redis:6379/0
      - API_BASE=http://api:8000
      - M87_API_KEY=${M87_API_KEY:-m87-dev-key-change-me}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  ui:
    build:
      context: ..
      dockerfile: infra/Dockerfile.ui
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  redis_data:
