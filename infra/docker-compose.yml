version: "3.8"

services:
  # ---- Phase 2: Postgres as system of record ----
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=m87
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-m87-dev-password}
      - POSTGRES_DB=m87_governance
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U m87 -d m87_governance"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # No public port - internal only for security
    volumes:
      - redis_data:/data
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --auto-aof-rewrite-percentage
      - "100"
      - --auto-aof-rewrite-min-size
      - "64mb"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://m87:${POSTGRES_PASSWORD:-m87-dev-password}@postgres:5432/m87_governance
      # P0.A: Bootstrap key is admin-only. Services use their own scoped keys.
      - M87_BOOTSTRAP_KEY=${M87_BOOTSTRAP_KEY:-m87-dev-key-change-me}
      - M87_API_KEY=${M87_API_KEY:-m87-dev-key-change-me}
      # Per-service scoped keys (seeded at startup)
      - M87_RUNNER_KEY=${M87_RUNNER_KEY:-}
      - M87_CASEY_KEY=${M87_CASEY_KEY:-}
      - M87_JORDAN_KEY=${M87_JORDAN_KEY:-}
      - M87_RILEY_KEY=${M87_RILEY_KEY:-}
      - M87_NOTIFIER_KEY=${M87_NOTIFIER_KEY:-}
      - M87_ENV=${M87_ENV:-dev}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - M87_ENABLE_TEST_ENDPOINTS=${M87_ENABLE_TEST_ENDPOINTS:-false}
      - M87_TOOL_MANIFEST_PATH=/app/tool_manifest.json
      - M87_MANIFEST_LOCK_PATH=/app/manifest.lock.json
      - M87_MAX_RUNNER_RESULT_BYTES=${M87_MAX_RUNNER_RESULT_BYTES:-65536}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  runner:
    build:
      context: ..
      dockerfile: infra/Dockerfile.runner
    environment:
      - REDIS_URL=redis://redis:6379/0
      - API_BASE=http://api:8000
      # P0.A: Runner uses its own scoped key (runner:result only)
      - M87_API_KEY=${M87_RUNNER_KEY:-${M87_API_KEY:-m87-dev-key-change-me}}
      - M87_TOOL_MANIFEST_PATH=app/tool_manifest.json
      - M87_MANIFEST_LOCK_PATH=manifest.lock.json
      - M87_MAX_RUNNER_RESULT_BYTES=${M87_MAX_RUNNER_RESULT_BYTES:-65536}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  notifier:
    build:
      context: ..
      dockerfile: infra/Dockerfile.notifier
    environment:
      - REDIS_URL=redis://redis:6379/0
      - API_BASE=http://api:8000
      # P0.A: Notifier uses its own scoped key (admin:emit only)
      - M87_API_KEY=${M87_NOTIFIER_KEY:-${M87_API_KEY:-m87-dev-key-change-me}}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  ui:
    build:
      context: ..
      dockerfile: infra/Dockerfile.ui
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  # ---- V1.3: Agent Adapters ----
  # Adapters propose actions but cannot execute or approve.
  # Server enforces effect scopes; adapters are just proposal generators.

  casey-adapter:
    build:
      context: ..
      dockerfile: services/casey-adapter/Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379/0
      - M87_API_BASE=http://api:8000
      # P0.A: Casey uses its own scoped key (proposal:create + Casey effects only)
      - M87_API_KEY=${M87_CASEY_KEY:-${M87_API_KEY:-m87-dev-key-change-me}}
      - POLL_INTERVAL=5
      - LOG_LEVEL=INFO
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  jordan-adapter:
    build:
      context: ..
      dockerfile: services/jordan-adapter/Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379/0
      - M87_API_BASE=http://api:8000
      # P0.A: Jordan uses its own scoped key (proposal:create + Jordan effects only)
      - M87_API_KEY=${M87_JORDAN_KEY:-${M87_API_KEY:-m87-dev-key-change-me}}
      - POLL_INTERVAL=5
      - LOG_LEVEL=INFO
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  riley-adapter:
    build:
      context: ..
      dockerfile: services/riley-adapter/Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379/0
      - M87_API_BASE=http://api:8000
      # P0.A: Riley uses its own scoped key (proposal:create + Riley effects only)
      - M87_API_KEY=${M87_RILEY_KEY:-${M87_API_KEY:-m87-dev-key-change-me}}
      - POLL_INTERVAL=5
      - LOG_LEVEL=INFO
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
