version: "3.9"

# Hardened deployment configuration with runner airgap
# Use this for production or security-sensitive environments

services:
  # ---- Phase 2: Postgres as system of record ----
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=m87
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-m87-dev-password}
      - POSTGRES_DB=m87_governance
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U m87 -d m87_governance"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --auto-aof-rewrite-percentage
      - "100"
      - --auto-aof-rewrite-min-size
      - "64mb"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://m87:${POSTGRES_PASSWORD:-m87-dev-password}@postgres:5432/m87_governance
      # P0.A: Scoped keys
      - M87_BOOTSTRAP_KEY=${M87_BOOTSTRAP_KEY:-m87-dev-key-change-me}
      - M87_API_KEY=${M87_API_KEY:-m87-dev-key-change-me}
      - M87_RUNNER_KEY=${M87_RUNNER_KEY:-}
      - M87_CASEY_KEY=${M87_CASEY_KEY:-}
      - M87_JORDAN_KEY=${M87_JORDAN_KEY:-}
      - M87_RILEY_KEY=${M87_RILEY_KEY:-}
      - M87_NOTIFIER_KEY=${M87_NOTIFIER_KEY:-}
      - M87_ENV=${M87_ENV:-prod}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - M87_ENABLE_TEST_ENDPOINTS=${M87_ENABLE_TEST_ENDPOINTS:-false}
      - M87_TOOL_MANIFEST_PATH=/app/tool_manifest.json
      - M87_MANIFEST_LOCK_PATH=/app/manifest.lock.json
      - M87_MAX_RUNNER_RESULT_BYTES=${M87_MAX_RUNNER_RESULT_BYTES:-65536}
      - M87_CHALLENGE_SECRET=${M87_CHALLENGE_SECRET:-change-me-in-production}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - public
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # HARDENED RUNNER: network_mode: none enforces complete airgap
  # Runner cannot make any outbound network calls
  # P0.B: File dispatch mode — jobs/results traverse via shared volume
  runner:
    build:
      context: ..
      dockerfile: infra/Dockerfile.runner
    network_mode: "none"  # HARD AIRGAP - no network access
    environment:
      # P0.B: File dispatch mode (no Redis needed with network_mode: none)
      - M87_DISPATCH_MODE=file
      - M87_FILE_INCOMING=/dispatch/incoming
      - M87_FILE_OUTGOING=/dispatch/outgoing
      - M87_TOOL_MANIFEST_PATH=app/tool_manifest.json
      - M87_MANIFEST_LOCK_PATH=manifest.lock.json
      - M87_MAX_RUNNER_RESULT_BYTES=${M87_MAX_RUNNER_RESULT_BYTES:-65536}
      - M87_MOUNT_CHECK_ENABLED=1
    volumes:
      - dispatch_incoming:/dispatch/incoming
      - dispatch_outgoing:/dispatch/outgoing
    restart: unless-stopped
    # Resource limits for defense-in-depth
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Job dispatcher bridges API to airgapped runner via shared volumes
  job-dispatcher:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    command: ["python", "-m", "app.job_dispatcher"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - M87_API_KEY=${M87_API_KEY:-m87-dev-key-change-me}
      - API_BASE=http://api:8000
      - JOB_QUEUE_PATH=/dispatch/incoming
      - RESULT_QUEUE_PATH=/dispatch/outgoing
    volumes:
      - dispatch_incoming:/dispatch/incoming
      - dispatch_outgoing:/dispatch/outgoing
    networks:
      - internal
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  notifier:
    build:
      context: ..
      dockerfile: infra/Dockerfile.notifier
    environment:
      - REDIS_URL=redis://redis:6379/0
      - API_BASE=http://api:8000
      # P0.A: Notifier uses its own scoped key (admin:emit only)
      - M87_API_KEY=${M87_NOTIFIER_KEY:-${M87_API_KEY:-m87-dev-key-change-me}}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
    networks:
      - internal
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  ui:
    build:
      context: ..
      dockerfile: infra/Dockerfile.ui
    ports:
      - "3000:3000"
    networks:
      - public
    depends_on:
      - api
    restart: unless-stopped

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true  # No external access

volumes:
  redis_data:
  postgres_data:
  dispatch_incoming:
  dispatch_outgoing:
