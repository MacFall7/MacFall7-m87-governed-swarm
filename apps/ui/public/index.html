<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>M87 Swarm</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 0 0 80px 0;
    }

    header {
      position: sticky;
      top: 0;
      background: linear-gradient(180deg, #0a0a0a 0%, rgba(10,10,10,0.95) 100%);
      padding: 16px;
      border-bottom: 1px solid #222;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pulse {
      width: 8px;
      height: 8px;
      background: #00ff88;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .pulse.disconnected {
      background: #ff4444;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    .tabs {
      display: flex;
      background: #111;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 68px;
      z-index: 99;
    }

    .tab {
      flex: 1;
      padding: 12px 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: #666;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab.active {
      color: #00ff88;
      border-bottom-color: #00ff88;
    }

    .tab .badge {
      background: #ff4444;
      color: white;
      font-size: 10px;
      padding: 2px 5px;
      border-radius: 8px;
      margin-left: 4px;
    }

    .tab .badge.jobs {
      background: #4488ff;
    }

    .panel {
      display: none;
      padding: 16px;
    }

    .panel.active {
      display: block;
    }

    .card {
      background: #151515;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .event-type {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .event-type.allowed { background: #0a3d0a; color: #00ff88; }
    .event-type.denied { background: #3d0a0a; color: #ff4444; }
    .event-type.needs_approval { background: #3d3d0a; color: #ffcc00; }
    .event-type.approved { background: #0a3d0a; color: #00ff88; }
    .event-type.completed { background: #0a3d0a; color: #00ff88; }
    .event-type.failed { background: #3d0a0a; color: #ff4444; }
    .event-type.pending { background: #3d3d0a; color: #ffcc00; }
    .event-type.running { background: #0a0a3d; color: #4488ff; }
    .event-type.created { background: #1a1a2a; color: #8888ff; }
    .event-type.intent { background: #1a1a1a; color: #888; }

    .time {
      font-size: 11px;
      color: #555;
    }

    .id-line {
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }

    .summary {
      font-size: 15px;
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .reasons {
      font-size: 13px;
      color: #666;
      padding-left: 12px;
      border-left: 2px solid #333;
    }

    .effects, .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .effect, .tag {
      font-size: 10px;
      padding: 3px 8px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      font-family: monospace;
    }

    .tag.tool {
      background: #1a1a2a;
      border-color: #4488ff;
      color: #4488ff;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:active {
      transform: scale(0.98);
    }

    .btn-approve {
      background: #00ff88;
      color: #000;
    }

    .btn-deny {
      background: #222;
      color: #ff4444;
      border: 1px solid #333;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #444;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .output {
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 11px;
      background: #0a0a0a;
      padding: 12px;
      border-radius: 8px;
      margin-top: 8px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 80px;
      overflow-y: auto;
      color: #888;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #0a0a0a;
      border-top: 1px solid #222;
      padding: 8px 16px 24px 16px;
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .refresh-btn {
      background: #1a1a1a;
      color: #888;
      border: 1px solid #333;
      padding: 10px 20px;
      font-size: 13px;
    }

    /* Settings panel */
    .settings-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .settings-row label {
      font-size: 13px;
      color: #888;
      min-width: 80px;
    }

    .settings-row input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 12px;
      color: #e0e0e0;
      font-size: 13px;
      font-family: monospace;
    }

    .save-btn {
      background: #00ff88;
      color: #000;
      padding: 10px 20px;
    }
  </style>
</head>
<body>
  <header>
    <h1><span class="pulse" id="pulse"></span> M87 Governed Swarm</h1>
    <div class="status" id="status">Connecting...</div>
  </header>

  <div class="tabs">
    <div class="tab active" data-panel="approvals">
      Approvals <span class="badge" id="approval-count" style="display:none">0</span>
    </div>
    <div class="tab" data-panel="jobs">
      Jobs <span class="badge jobs" id="job-count" style="display:none">0</span>
    </div>
    <div class="tab" data-panel="timeline">Timeline</div>
    <div class="tab" data-panel="settings">⚙️</div>
  </div>

  <div class="panel active" id="approvals">
    <div class="empty" id="approvals-empty">
      <div class="empty-icon">✓</div>
      <div>No pending approvals</div>
    </div>
    <div id="approvals-list"></div>
  </div>

  <div class="panel" id="jobs">
    <div class="empty" id="jobs-empty" style="display:none">
      <div class="empty-icon">📋</div>
      <div>No jobs yet</div>
    </div>
    <div id="jobs-list"></div>
  </div>

  <div class="panel" id="timeline">
    <div id="timeline-list"></div>
  </div>

  <div class="panel" id="settings">
    <div class="card">
      <h3 style="margin-bottom: 16px; font-size: 16px;">Configuration</h3>
      <div class="settings-row">
        <label>API Key</label>
        <input type="password" id="api-key-input" placeholder="Enter API key">
      </div>
      <div class="settings-row">
        <label>API URL</label>
        <input type="text" id="api-url-input" placeholder="http://localhost:8000">
      </div>
      <button class="save-btn" onclick="saveSettings()">Save</button>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="refresh-btn" onclick="refresh()">↻ Refresh</button>
  </div>

  <script>
    // Config with localStorage persistence
    let API_KEY = localStorage.getItem('m87_api_key') || 'm87-dev-key-change-me';
    let API = localStorage.getItem('m87_api_url') || (
      window.location.hostname === 'localhost'
        ? 'http://localhost:8000'
        : `${window.location.protocol}//${window.location.hostname}:8000`
    );

    // Initialize settings inputs
    document.getElementById('api-key-input').value = API_KEY;
    document.getElementById('api-url-input').value = API;

    function saveSettings() {
      API_KEY = document.getElementById('api-key-input').value;
      API = document.getElementById('api-url-input').value;
      localStorage.setItem('m87_api_key', API_KEY);
      localStorage.setItem('m87_api_url', API);
      refresh();
      alert('Settings saved');
    }

    function headers() {
      return {
        'Content-Type': 'application/json',
        'X-M87-Key': API_KEY,
      };
    }

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.panel).classList.add('active');
      });
    });

    function formatTime(id) {
      if (!id) return '';
      const ts = parseInt(id.split('-')[0]);
      const date = new Date(ts);
      return date.toLocaleTimeString();
    }

    function getEventClass(type) {
      if (type.includes('allowed')) return 'allowed';
      if (type.includes('denied')) return 'denied';
      if (type.includes('needs_approval')) return 'needs_approval';
      if (type.includes('approved')) return 'approved';
      if (type.includes('completed')) return 'completed';
      if (type.includes('failed')) return 'failed';
      if (type.includes('created')) return 'created';
      return 'intent';
    }

    function renderApproval(item) {
      const payload = item.payload;
      return `
        <div class="card" id="approval-${item.proposal_id}">
          <div class="card-header">
            <span class="event-type needs_approval">Needs Approval</span>
            <span class="time">${formatTime(item.id)}</span>
          </div>
          <div class="id-line">Proposal: ${item.proposal_id}</div>
          ${payload.summary ? `<div class="summary">${payload.summary}</div>` : ''}
          ${payload.agent ? `<div class="id-line">Agent: ${payload.agent}</div>` : ''}
          <div class="reasons">${(payload.reasons || []).join('<br>')}</div>
          ${payload.allowed_effects ? `
            <div class="effects">
              ${payload.allowed_effects.map(e => `<span class="effect">${e}</span>`).join('')}
            </div>
          ` : ''}
          <div class="actions">
            <button class="btn-deny" onclick="denyProposal('${item.proposal_id}')">Deny</button>
            <button class="btn-approve" onclick="approveProposal('${item.proposal_id}')">Approve</button>
          </div>
        </div>
      `;
    }

    function renderJob(job) {
      const statusClass = job.status || 'pending';
      return `
        <div class="card">
          <div class="card-header">
            <span class="event-type ${statusClass}">${job.status || 'pending'}</span>
            <span class="time">${formatTime(job.stream_id)}</span>
          </div>
          <div class="id-line">Job: ${job.job_id}</div>
          <div class="id-line">Proposal: ${job.proposal_id}</div>
          <div class="tags">
            <span class="tag tool">${job.tool}</span>
            <span class="tag">timeout: ${job.timeout_seconds}s</span>
          </div>
          ${job.output ? `<div class="output">${job.output}</div>` : ''}
          ${job.error ? `<div class="output" style="color: #ff4444">${job.error}</div>` : ''}
        </div>
      `;
    }

    function renderEvent(event) {
      const type = event.type || 'unknown';
      const payload = event.payload || {};
      const cls = getEventClass(type);

      let content = '';
      if (payload.job_id) {
        content += `<div class="id-line">Job: ${payload.job_id}</div>`;
      }
      if (payload.proposal_id) {
        content += `<div class="id-line">Proposal: ${payload.proposal_id}</div>`;
      }
      if (payload.reasons) {
        content += `<div class="reasons">${payload.reasons.join('<br>')}</div>`;
      }
      if (payload.goal) {
        content += `<div class="summary">${payload.goal}</div>`;
      }
      if (payload.tool) {
        content += `<div class="tags"><span class="tag tool">${payload.tool}</span></div>`;
      }
      if (payload.output) {
        content += `<div class="output">${payload.output}</div>`;
      }
      if (payload.allowed_effects) {
        content += `<div class="effects">${payload.allowed_effects.map(e => `<span class="effect">${e}</span>`).join('')}</div>`;
      }

      return `
        <div class="card">
          <div class="card-header">
            <span class="event-type ${cls}">${type.replace('proposal.', '').replace('job.', '').replace('intent.', '')}</span>
            <span class="time">${formatTime(event.id)}</span>
          </div>
          ${content}
        </div>
      `;
    }

    async function loadPendingApprovals() {
      try {
        const res = await fetch(`${API}/v1/pending-approvals`);
        const data = await res.json();
        const pending = data.pending || [];

        const countEl = document.getElementById('approval-count');
        const emptyEl = document.getElementById('approvals-empty');
        const listEl = document.getElementById('approvals-list');

        if (pending.length > 0) {
          countEl.textContent = pending.length;
          countEl.style.display = 'inline';
          emptyEl.style.display = 'none';
          listEl.innerHTML = pending.map(renderApproval).join('');
        } else {
          countEl.style.display = 'none';
          emptyEl.style.display = 'block';
          listEl.innerHTML = '';
        }
      } catch (e) {
        console.error('Failed to load approvals:', e);
      }
    }

    async function loadJobs() {
      try {
        const res = await fetch(`${API}/v1/jobs?limit=50`);
        const data = await res.json();
        const jobs = data.jobs || [];

        const countEl = document.getElementById('job-count');
        const emptyEl = document.getElementById('jobs-empty');
        const listEl = document.getElementById('jobs-list');

        const pendingCount = jobs.filter(j => j.status === 'pending' || j.status === 'running').length;

        if (jobs.length > 0) {
          if (pendingCount > 0) {
            countEl.textContent = pendingCount;
            countEl.style.display = 'inline';
          } else {
            countEl.style.display = 'none';
          }
          emptyEl.style.display = 'none';
          listEl.innerHTML = jobs.reverse().map(renderJob).join('');
        } else {
          countEl.style.display = 'none';
          emptyEl.style.display = 'block';
          listEl.innerHTML = '';
        }
      } catch (e) {
        console.error('Failed to load jobs:', e);
      }
    }

    async function loadTimeline() {
      try {
        const res = await fetch(`${API}/v1/events?limit=50`);
        const data = await res.json();
        const events = data.events || [];

        document.getElementById('timeline-list').innerHTML =
          events.reverse().map(renderEvent).join('') || '<div class="empty">No events yet</div>';
      } catch (e) {
        console.error('Failed to load timeline:', e);
      }
    }

    async function approveProposal(proposalId) {
      try {
        const res = await fetch(`${API}/v1/approve/${proposalId}`, {
          method: 'POST',
          headers: headers(),
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Failed');
        }
        document.getElementById(`approval-${proposalId}`)?.remove();
        refresh();
      } catch (e) {
        alert('Failed to approve: ' + e.message);
      }
    }

    async function denyProposal(proposalId) {
      try {
        const res = await fetch(`${API}/v1/deny/${proposalId}`, {
          method: 'POST',
          headers: headers(),
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Failed');
        }
        document.getElementById(`approval-${proposalId}`)?.remove();
        refresh();
      } catch (e) {
        alert('Failed to deny: ' + e.message);
      }
    }

    async function checkHealth() {
      try {
        const res = await fetch(`${API}/health`);
        const data = await res.json();
        document.getElementById('status').textContent =
          data.ok ? `Connected • V${data.version || '?'} • Redis ${data.redis}` : 'Disconnected';
        document.getElementById('pulse').classList.toggle('disconnected', !data.ok);
      } catch (e) {
        document.getElementById('status').textContent = 'Disconnected';
        document.getElementById('pulse').classList.add('disconnected');
      }
    }

    async function refresh() {
      await Promise.all([loadPendingApprovals(), loadJobs(), loadTimeline(), checkHealth()]);
    }

    // Initial load
    refresh();

    // Poll every 3 seconds
    setInterval(refresh, 3000);
  </script>
</body>
</html>
